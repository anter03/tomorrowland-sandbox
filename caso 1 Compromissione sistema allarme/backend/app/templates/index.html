<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Tomorrowland Official App</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #0c0c0e; color: white; text-align: center; padding: 50px; }
        .container { border: 1px solid #2a2a32; padding: 30px; border-radius: 15px; display: inline-block; background: #16161a; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #dfb15b; }
        .status { color: #2ecc71; font-weight: bold; }
        #panic-banner { display: none; background: #c0392b; color: white; position: fixed; top:0; left:0; width:100%; height:100%; z-index:9999; justify-content:center; align-items:center; flex-direction:column; font-size: 35px; font-weight: bold; animation: blink 1s infinite; padding: 20px; box-sizing: border-box; }
        @keyframes blink { 0% { background: #c0392b; } 50% { background: #7f231c; } 100% { background: #c0392b; } }
    </style>
</head>
<body>
    <div id="app-content" class="container">
        <h1>🌌 TOMORROWLAND APP 🌌</h1>
        <p>User-ID: <b>Attendee_#48291</b></p>
        <p>Stato Braccialetto RFID: <span class="status">Sincronizzato</span></p>
        <p>Bilancio Cashless: <span style="font-size: 20px; color: #dfb15b;">🚀 54.0 Pearls</span></p>
        <hr style="border-color: #2a2a32;">
        <p style="color: #888;">Prossimo Show: <b>Martin Garrix (Main Stage) - 22:00</b></p>
    </div>

    <div id="panic-banner">
        <h1>🚨 ATTENZIONE: EMERGENZA GENERALE 🚨</h1>
        <p id="alert-message" style="border: 2px solid white; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px;"></p>
        <p style="font-size: 22px; font-weight: normal;">Evacuare l'area seguendo le luci verdi. Non correre. Mantenere la calma.</p>
    </div>

    <script>
        setInterval(async () => {
            try {
                const response = await fetch('/api/messages');
                const data = await response.json();
                if (data.messages && data.messages.length > 0) {
                    const lastMsg = data.messages[data.messages.length - 1];
                    document.getElementById('app-content').style.display = 'none';
                    document.getElementById('panic-banner').style.display = 'flex';
                    document.getElementById('alert-message').innerText = lastMsg;
                } else {
                    document.getElementById('app-content').style.display = 'block';
                    document.getElementById('panic-banner').style.display = 'none';
                }
            } catch (err) {
                console.error("Errore di sincronizzazione con l'infrastruttura del festival", err);
            }
        }, 2000);
    </script>
</body>
</html>
