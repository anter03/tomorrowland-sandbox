; ============================================================
;  Dialplan — Routing delle chiamate
; ============================================================

; ── Contesto ESTERNO (chiamate anonime / spoofate) ──────────
;  Le chiamate che arrivano dall'endpoint [anonymous] sono
;  instradate qui. Vengono ruotate direttamente all'operatore
;  200 senza alcuna validazione di identità.
[from-external]

; Extension "s" — usata quando non viene specificato un DID
exten => s,1,NoOp(=== INCOMING ANONYMOUS INVITE ===)
 same => n,Log(WARNING, SECURITY: Anonymous call from ${CALLERID(all)} — CWE-862 bypass)
 same => n,Set(CALLERID(name)=${CALLERID(name)})
 same => n,Dial(PJSIP/200,30)
 same => n,Hangup()

; Catch-all per qualsiasi numero composto
exten => _X.,1,NoOp(=== INCOMING CALL TO ${EXTEN} ===)
 same => n,Log(WARNING, SECURITY: Anonymous call from ${CALLERID(all)} to ${EXTEN})
 same => n,Dial(PJSIP/200,30)
 same => n,Hangup()

; Match esplicito per l'interno 200
exten => 200,1,NoOp(=== DIRECT DIAL TO OPERATOR 200 ===)
 same => n,Log(NOTICE, Direct dial to operator 200 from ${CALLERID(all)})
 same => n,Dial(PJSIP/200,30)
 same => n,Hangup()

; ── Contesto INTERNO (chiamate dall'operatore) ──────────────
[from-internal]
exten => _X.,1,NoOp(Outgoing call to ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()
