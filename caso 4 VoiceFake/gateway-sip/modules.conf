; ============================================================
;  Modules Configuration — Caricamento selettivo
; ============================================================

[modules]
autoload=yes

; Moduli critici che DEVONO essere caricati:
;   res_pjsip.so                         — Stack SIP
;   res_pjsip_endpoint_identifier_anonymous.so — Matching endpoint [anonymous]
;   res_pjsip_session.so                 — Gestione sessioni
;   res_pjsip_sdp_rtp_session.so         — Negoziazione SDP/RTP
;   res_rtp_asterisk.so                  — Engine RTP
;   codec_ulaw.so / codec_alaw.so        — Codec G.711
;   app_dial.so                          — Applicazione Dial()

; Moduli NON necessari (disabilitati per ridurre superficie)
noload = chan_sip.so
noload = res_hep.so
noload = res_hep_pjsip.so
noload = res_hep_rtcp.so
