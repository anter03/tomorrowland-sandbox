; ============================================================
;  PJSIP Configuration — Gateway SIP Vulnerabile
;  CVE Mapping:  CWE-862 (Missing Authorization)
;                CWE-287 (Improper Authentication)
;
;  ATTENZIONE: Configurazione INTENZIONALMENTE INSICURA
;  per validazione Unified Kill Chain in ambiente sandbox.
; ============================================================

; ── Trasporto UDP non cifrato (no TLS = no SIPS) ────────────
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ── Endpoint operatore legittimo (interno 200) ──────────────
[200]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
allow=alaw
auth=auth200
aors=200
direct_media=no
media_encryption=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[auth200]
type=auth
auth_type=userpass
username=200
password=operatore123

[200]
type=aor
max_contacts=1
remove_existing=yes

; ── VULNERABILITÀ: Endpoint anonimo ─────────────────────────
;  CWE-862: Nessuna autorizzazione richiesta per INVITE
;  CWE-287: Nessuna autenticazione per chiamate in ingresso
;
;  Questo endpoint cattura tutte le richieste SIP che non
;  corrispondono a un endpoint autenticato. Richiede il
;  modulo res_pjsip_endpoint_identifier_anonymous.
;
;  In un ambiente di produzione, questo endpoint NON dovrebbe
;  esistere. La sua presenza è la vulnerabilità sfruttata
;  dall'attaccante per iniettare l'INVITE spoofato.
; ────────────────────────────────────────────────────────────
[anonymous]
type=endpoint
context=from-external
disallow=all
allow=ulaw
allow=alaw
transport=transport-udp
direct_media=no
media_encryption=no
