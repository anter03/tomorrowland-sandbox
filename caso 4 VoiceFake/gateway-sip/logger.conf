; ============================================================
;  Logger Configuration — SIEM Integration (CTRL-C02)
;  Volume-mounted su ./logs per raccolta Wazuh
; ============================================================

[general]
dateformat=%F %T.%3q

[logfiles]
; Console output (visibile in docker logs)
console => notice,warning,error

; Log generale messaggi
messages => notice,warning,error

; Log completo con debug (per analisi forense)
full => notice,warning,error,debug,verbose

; Log di sicurezza dedicato per SIEM/Wazuh (CTRL-C02)
; Cattura eventi di autenticazione, INVITE rifiutati, anomalie
security_log => security
